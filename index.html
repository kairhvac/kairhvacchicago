<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Air Heating Cooling</title>
    <!-- 외부 스타일시트 파일(style.css)을 연결합니다 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 상단 헤더 영역 -->
    <header class="site-header">
        <div class="logo-container">
            <a href="/">
                <!-- 왼쪽 상단 로고 이미지 -->
                <img src="K_air.png" alt="K-Air Heating Cooling" class="site-logo">
            </a>
        </div>
        <nav class="site-nav">
            <ul>
                <li><a href="#home">홈</a></li>
                <li><a href="#services">서비스</a></li>
                <!-- 모바일 사용자를 위해 메뉴 우측에 바로 전화를 걸 수 있는 버튼을 배치했습니다 -->
                <li><a href="tel:847-306-9797" class="call-nav-btn">📞 전화 걸기</a></li>
            </ul>
        </nav>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="hero-section">
        <!-- 로고 하단 슬로건 -->
        <p class="slogan">Comfort You Can Count On</p>
        <h1>Chicago 지역 HVAC 전문가, K-Air</h1>
        
        <!-- EPA 라이센스 정보 -->
        <div class="license-badge">
            📋 EPA 608 UNIVERSAL 라이센스 보유
        </div>

        <!-- 비즈니스 정보 카드 (클릭 시 전화/이메일 자동 연결) -->
        <div class="contact-card">
            <p class="contact-name">대표: <strong>YS KIM</strong></p>
            <p class="contact-item">
                <a href="tel:847-306-9797" class="phone-link">📞 847-306-9797</a>
            </p>
            <p class="contact-item">
                <a href="mailto:ADMIN@KAIRHVACCHICAGO.COM" class="email-link">✉️ ADMIN@KAIRHVACCHICAGO.COM</a>
            </p>
        </div>

        <!-- 4대 핵심 서비스 그리드 -->
        <div class="services-grid">
            <div class="service-card">
                <div class="service-icon">❄️</div>
                <div class="service-text">냉난방 시스템</div>
            </div>
            <div class="service-card">
                <div class="service-icon">🔧</div>
                <div class="service-text">정기 점검 및 수리</div>
            </div>
            <div class="service-card">
                <div class="service-icon">🚰</div>
                <div class="service-text">플러밍 작업</div>
            </div>
            <div class="service-card">
                <div class="service-icon">⚡</div>
                <div class="service-text">전기 작업</div>
            </div>
        </div>
    </main>

    <!-- 하단 푸터 영역 -->
    <footer class="footer-qr">
        <p>저희 웹사이트를 QR코드로도 방문해 보세요</p>
        <div class="qr-code">QR CODE</div>
    </footer>

</body>
</html>
